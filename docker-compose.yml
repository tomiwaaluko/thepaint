services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: chalk
      POSTGRES_PASSWORD: chalk
      POSTGRES_DB: chalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chalk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://chalk:chalk@db:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://chalk:chalk@db:5432/mlflow
      --default-artifact-root /mlflow/artifacts

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chalk:chalk@db:5432/chalk
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn chalk.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    working_dir: /app

  airflow-init:
    image: apache/airflow:2.9.0
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://chalk:chalk@db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-chalk-airflow-secret-key-change-me}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: postgresql+asyncpg://chalk:chalk@db:5432/chalk
      REDIS_URL: redis://redis:6379/0
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PYTHONPATH: /opt/airflow
    entrypoint: >
      bash -c "
        airflow db init &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@chalk.dev || true
      "
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./chalk:/opt/airflow/chalk
      - ./models:/opt/airflow/models
    depends_on:
      db:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.9.0
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./chalk:/opt/airflow/chalk
      - ./models:/opt/airflow/models
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow webserver --port 8080
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.0
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./chalk:/opt/airflow/chalk
      - ./models:/opt/airflow/models
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:
